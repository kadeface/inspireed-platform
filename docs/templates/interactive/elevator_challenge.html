<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏一：电梯大挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        .building-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            min-height: 500px;
            background: linear-gradient(to bottom, #87ceeb 0%, #e0f6ff 100%);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .building {
            width: 200px;
            height: 450px;
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
            border-radius: 10px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid #5d6d7e;
        }

        .floor {
            height: calc(100% / 10);
            border-bottom: 2px solid #34495e;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-weight: bold;
            color: #2c3e50;
        }

        .floor-label {
            position: absolute;
            left: 10px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .elevator {
            width: 80px;
            height: calc(100% / 10);
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            border: 3px solid #d35400;
            border-radius: 5px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 1s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .elevator::before {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 3px;
        }

        .control-panel {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .control-title {
            font-size: 1.8em;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .floor-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .floor-btn {
            padding: 15px;
            font-size: 1.3em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background: white;
            color: #2980b9;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .floor-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .floor-btn.active {
            background: #f39c12;
            color: white;
        }

        .info-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-card {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .info-card.ordinal {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .info-card.cardinal {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .info-label {
            font-size: 1.1em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .info-value {
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .challenge-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .challenge-title {
            font-size: 1.8em;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .question-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .option-button {
            padding: 20px;
            font-size: 1.2em;
            border: 3px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            color: #333;
        }

        .option-button:hover {
            background: #f0f0f0;
            border-color: #4facfe;
            transform: scale(1.05);
        }

        .option-button.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option-button.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            display: none;
        }

        .feedback.correct {
            background: #c8e6c9;
            color: #2e7d32;
            display: block;
        }

        .feedback.incorrect {
            background: #ffcdd2;
            color: #c62828;
            display: block;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            border-radius: 5px;
            font-size: 1.1em;
            color: #1565c0;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .reset-button {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            font-size: 1.3em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .reset-button:hover {
            transform: scale(1.05);
        }

        .movement-trace {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            background: rgba(255,255,0,0.6);
            z-index: 5;
            transition: height 1s, bottom 1s;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .options-container {
                grid-template-columns: 1fr;
            }

            .floor-buttons {
                grid-template-columns: repeat(3, 1fr);
            }

            .info-panel {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🏢 游戏一：电梯大挑战</h1>
        <div class="subtitle">理解：所在楼层 vs 移动层数</div>

        <div class="building-container">
            <div class="building" id="building">
                <div class="elevator" id="elevator">🛗</div>
                <!-- 楼层将通过JavaScript生成 -->
            </div>
        </div>

        <div class="control-panel">
            <div class="control-title">🎮 控制面板</div>
            <div class="floor-buttons" id="floorButtons">
                <!-- 按钮将通过JavaScript生成 -->
            </div>
            <div class="info-panel">
                <div class="info-card ordinal">
                    <div class="info-label">当前楼层（序数）</div>
                    <div class="info-value" id="currentFloor">1</div>
                </div>
                <div class="info-card cardinal">
                    <div class="info-label">移动层数（基数）</div>
                    <div class="info-value" id="movedFloors">0</div>
                </div>
            </div>
        </div>

        <div class="challenge-section">
            <div class="challenge-title">📝 挑战练习</div>
            <div class="question-container">
                <div class="question-text" id="questionText">问题将显示在这里</div>
                <div class="options-container" id="optionsContainer">
                    <!-- 选项将通过JavaScript动态生成 -->
                </div>
                <div class="feedback" id="feedback"></div>
                <div class="explanation" id="explanation"></div>
            </div>
        </div>

        <button class="reset-button" onclick="resetGame()">🔄 重新开始</button>
    </div>

    <script>
        const totalFloors = 10;
        let currentFloor = 1;
        let previousFloor = 1;
        let totalMoved = 0;
        let currentQuestion = 0;

        // 问题库
        const questions = [
            {
                question: "电梯从第1层到第5层，移动了几层楼？",
                options: ["4层", "5层", "6层", "3层"],
                correct: 0,
                explanation: "从第1层到第5层，移动了4层楼（5-1=4）。记住：移动层数 = 终点楼层 - 起点楼层。"
            },
            {
                question: "电梯停在第7层，这里的'7'是什么数？",
                options: ["基数", "序数", "分数", "小数"],
                correct: 1,
                explanation: "'第7层'表示位置，所以是序数。"
            },
            {
                question: "电梯从第3层移动到第8层，移动了几层楼？",
                options: ["5层", "6层", "7层", "8层"],
                correct: 0,
                explanation: "从第3层到第8层，移动了5层楼（8-3=5）。"
            },
            {
                question: "电梯爬了6层楼，从第2层出发，现在停在第几层？",
                options: ["第6层", "第7层", "第8层", "第9层"],
                correct: 2,
                explanation: "从第2层爬6层，到达第8层（2+6=8）。"
            },
            {
                question: "电梯从第10层下降到第4层，下降了几层楼？",
                options: ["5层", "6层", "7层", "4层"],
                correct: 1,
                explanation: "从第10层到第4层，下降了6层楼（10-4=6）。"
            }
        ];

        // 初始化楼层
        function initBuilding() {
            const building = document.getElementById('building');
            building.innerHTML = '<div class="elevator" id="elevator">🛗</div>';
            
            for (let i = totalFloors; i >= 1; i--) {
                const floor = document.createElement('div');
                floor.className = 'floor';
                floor.style.bottom = `${((totalFloors - i) / totalFloors) * 100}%`;
                const label = document.createElement('div');
                label.className = 'floor-label';
                label.textContent = `${i}层`;
                floor.appendChild(label);
                building.appendChild(floor);
            }
            
            updateElevatorPosition();
        }

        // 初始化按钮
        function initButtons() {
            const buttonsContainer = document.getElementById('floorButtons');
            buttonsContainer.innerHTML = '';
            
            for (let i = 1; i <= totalFloors; i++) {
                const btn = document.createElement('button');
                btn.className = 'floor-btn';
                btn.textContent = `${i}层`;
                btn.onclick = () => moveToFloor(i);
                buttonsContainer.appendChild(btn);
            }
        }

        // 移动到指定楼层
        function moveToFloor(targetFloor) {
            if (targetFloor === currentFloor) return;
            
            previousFloor = currentFloor;
            const floorsMoved = Math.abs(targetFloor - currentFloor);
            totalMoved += floorsMoved;
            currentFloor = targetFloor;
            
            updateElevatorPosition();
            updateInfo();
            updateButtons();
        }

        // 更新电梯位置
        function updateElevatorPosition() {
            const elevator = document.getElementById('elevator');
            const bottomPercent = ((currentFloor - 1) / (totalFloors - 1)) * 100;
            elevator.style.bottom = `${bottomPercent}%`;
        }

        // 更新信息显示
        function updateInfo() {
            document.getElementById('currentFloor').textContent = currentFloor;
            document.getElementById('movedFloors').textContent = totalMoved;
        }

        // 更新按钮状态
        function updateButtons() {
            const buttons = document.querySelectorAll('.floor-btn');
            buttons.forEach((btn, index) => {
                if (index + 1 === currentFloor) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // 显示问题
        function showQuestion() {
            if (currentQuestion >= questions.length) {
                currentQuestion = 0;
            }
            
            const q = questions[currentQuestion];
            document.getElementById('questionText').textContent = q.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-button';
                button.textContent = option;
                button.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(button);
            });
            
            // 清除之前的反馈
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('explanation').className = 'explanation';
        }

        // 检查答案
        function checkAnswer(selectedIndex) {
            const q = questions[currentQuestion];
            const buttons = document.querySelectorAll('#optionsContainer .option-button');
            const feedback = document.getElementById('feedback');
            const explanation = document.getElementById('explanation');
            
            // 禁用所有按钮
            buttons.forEach(btn => {
                btn.style.pointerEvents = 'none';
                const btnIndex = Array.from(buttons).indexOf(btn);
                if (btnIndex === q.correct) {
                    btn.classList.add('correct');
                } else if (btnIndex === selectedIndex) {
                    btn.classList.add('incorrect');
                }
            });
            
            if (selectedIndex === q.correct) {
                feedback.textContent = '✅ 答对了！';
                feedback.className = 'feedback correct';
            } else {
                feedback.textContent = '❌ 答错了，再想想！';
                feedback.className = 'feedback incorrect';
            }
            
            explanation.textContent = q.explanation;
            explanation.classList.add('show');
            
            // 3秒后显示下一题
            setTimeout(() => {
                currentQuestion++;
                showQuestion();
                buttons.forEach(btn => {
                    btn.style.pointerEvents = 'auto';
                    btn.classList.remove('correct', 'incorrect');
                });
            }, 3000);
        }

        // 重置游戏
        function resetGame() {
            currentFloor = 1;
            previousFloor = 1;
            totalMoved = 0;
            currentQuestion = 0;
            
            updateElevatorPosition();
            updateInfo();
            updateButtons();
            showQuestion();
        }

        // 初始化
        window.addEventListener('load', () => {
            initBuilding();
            initButtons();
            updateInfo();
            updateButtons();
            showQuestion();
        });
    </script>
</body>
</html>
