<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏二：果园小助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.2em;
        }

        .orchard-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .tree-container {
            background: linear-gradient(to bottom, #87ceeb 0%, #90ee90 100%);
            padding: 30px;
            border-radius: 15px;
            min-height: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .tree-title {
            font-size: 1.5em;
            font-weight: bold;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 20px;
        }

        .apples-row {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 50px;
            padding-bottom: 20px;
        }

        .apple {
            width: 100px;
            height: 100px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }

        .apple:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .apple.selected {
            transform: scale(1.15);
            box-shadow: 0 0 25px rgba(255,255,0,0.8);
            animation: pulse 1s infinite;
        }

        .apple.removed {
            opacity: 0.3;
            transform: scale(0.5);
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1.15); }
            50% { transform: scale(1.25); }
        }

        .apple-number {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.1em;
            font-weight: bold;
            color: #2c3e50;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.9);
            background: rgba(255,255,255,0.95);
            padding: 6px 12px;
            border-radius: 12px;
            white-space: nowrap;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .apple:nth-child(1) { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%); }
        .apple:nth-child(2) { background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%); }
        .apple:nth-child(3) { background: linear-gradient(135deg, #ffe66d 0%, #ffd93d 100%); }
        .apple:nth-child(4) { background: linear-gradient(135deg, #a8e6cf 0%, #88d8a3 100%); }
        .apple:nth-child(5) { background: linear-gradient(135deg, #ff9ff3 0%, #f368e0 100%); }
        .apple:nth-child(6) { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%); }
        .apple:nth-child(7) { background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%); }
        .apple:nth-child(8) { background: linear-gradient(135deg, #ffe66d 0%, #ffd93d 100%); }

        .basket-container {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .basket-title {
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .basket {
            background: rgba(255,255,255,0.9);
            border: 5px solid #8b4513;
            border-radius: 20px 20px 5px 5px;
            min-height: 300px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-content: flex-start;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.2);
        }

        .basket-apple {
            width: 60px;
            height: 60px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .control-panel {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .control-title {
            font-size: 1.8em;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .task-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .task-btn {
            padding: 20px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background: white;
            color: #2980b9;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .task-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .task-btn.active {
            background: #f39c12;
            color: white;
        }

        .task-input {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .task-input input {
            padding: 15px;
            font-size: 1.3em;
            border: 3px solid #ddd;
            border-radius: 10px;
            width: 100px;
            text-align: center;
            font-weight: bold;
        }

        .task-input button {
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background: #4caf50;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .task-input button:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .info-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-card {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .info-card.ordinal {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .info-card.cardinal {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .info-label {
            font-size: 1.1em;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .info-value {
            font-size: 2.5em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .challenge-section {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .challenge-title {
            font-size: 1.8em;
            font-weight: bold;
            color: white;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .question-container {
            background: white;
            padding: 25px;
            border-radius: 10px;
        }

        .question-text {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
        }

        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .option-button {
            padding: 20px;
            font-size: 1.2em;
            border: 3px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            color: #333;
        }

        .option-button:hover {
            background: #f0f0f0;
            border-color: #4facfe;
            transform: scale(1.05);
        }

        .option-button.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        .option-button.incorrect {
            background: #f44336;
            color: white;
            border-color: #f44336;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
            display: none;
        }

        .feedback.correct {
            background: #c8e6c9;
            color: #2e7d32;
            display: block;
        }

        .feedback.incorrect {
            background: #ffcdd2;
            color: #c62828;
            display: block;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            border-radius: 5px;
            font-size: 1.1em;
            color: #1565c0;
            display: none;
        }

        .explanation.show {
            display: block;
        }

        .reset-button {
            display: block;
            margin: 30px auto;
            padding: 15px 40px;
            font-size: 1.3em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .reset-button:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .orchard-section {
                grid-template-columns: 1fr;
            }

            .options-container {
                grid-template-columns: 1fr;
            }

            .task-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🍎 游戏二：果园小助手</h1>
        <div class="subtitle">理解：拿走几个 vs 拿第几个</div>

        <div class="orchard-section">
            <div class="tree-container">
                <div class="tree-title">🌳 苹果树</div>
                <div class="apples-row" id="applesRow">
                    <!-- 苹果将通过JavaScript生成 -->
                </div>
            </div>

            <div class="basket-container">
                <div class="basket-title">🧺 篮子</div>
                <div class="basket" id="basket">
                    <!-- 篮子中的苹果将显示在这里 -->
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div class="control-title">🎮 任务控制</div>
            <div class="task-buttons">
                <button class="task-btn" onclick="setTaskMode('cardinal')">拿走几个（基数）</button>
                <button class="task-btn" onclick="setTaskMode('ordinal')">拿第几个（序数）</button>
            </div>
            <div class="task-input">
                <span style="font-size: 1.3em; color: white; font-weight: bold;">数量/位置：</span>
                <input type="number" id="taskInput" min="1" max="8" value="1">
                <button onclick="executeTask()">执行任务</button>
            </div>
            <div class="info-panel">
                <div class="info-card ordinal">
                    <div class="info-label">已选位置（序数）</div>
                    <div class="info-value" id="selectedOrdinal">-</div>
                </div>
                <div class="info-card cardinal">
                    <div class="info-label">已拿数量（基数）</div>
                    <div class="info-value" id="selectedCardinal">0</div>
                </div>
            </div>
        </div>

        <div class="challenge-section">
            <div class="challenge-title">📝 挑战练习</div>
            <div class="question-container">
                <div class="question-text" id="questionText">问题将显示在这里</div>
                <div class="options-container" id="optionsContainer">
                    <!-- 选项将通过JavaScript动态生成 -->
                </div>
                <div class="feedback" id="feedback"></div>
                <div class="explanation" id="explanation"></div>
            </div>
        </div>

        <button class="reset-button" onclick="resetGame()">🔄 重新开始</button>
    </div>

    <script>
        const totalApples = 8;
        let apples = [];
        let basket = [];
        let taskMode = 'cardinal'; // 'cardinal' or 'ordinal'
        let selectedApples = [];
        let currentQuestion = 0;

        // 问题库
        const questions = [
            {
                question: "拿走第3个苹果，这里的'3'是什么数？",
                options: ["基数", "序数", "分数", "小数"],
                correct: 1,
                explanation: "'第3个'表示位置，所以是序数。"
            },
            {
                question: "拿走3个苹果，这里的'3'是什么数？",
                options: ["基数", "序数", "分数", "小数"],
                correct: 0,
                explanation: "'3个'表示数量，所以是基数。"
            },
            {
                question: "从8个苹果中拿走第5个，还剩几个苹果？",
                options: ["3个", "4个", "5个", "7个"],
                correct: 3,
                explanation: "拿走第5个苹果，还剩7个苹果（8-1=7）。注意：拿走'第几个'是拿走1个，不是拿走5个！"
            },
            {
                question: "从8个苹果中拿走3个，还剩几个苹果？",
                options: ["3个", "4个", "5个", "6个"],
                correct: 2,
                explanation: "拿走3个苹果，还剩5个苹果（8-3=5）。"
            },
            {
                question: "拿走第1、第2、第3个苹果，一共拿走了几个？",
                options: ["1个", "2个", "3个", "6个"],
                correct: 2,
                explanation: "拿走第1、第2、第3个，一共拿走了3个苹果。虽然说的是'第几个'（序数），但问的是'几个'（基数），答案是3个。"
            }
        ];

        // 初始化苹果
        function initApples() {
            const applesRow = document.getElementById('applesRow');
            applesRow.innerHTML = '';
            apples = [];
            
            for (let i = 0; i < totalApples; i++) {
                const apple = document.createElement('div');
                apple.className = 'apple';
                apple.setAttribute('data-index', i);
                apple.setAttribute('data-position', i + 1);
                apple.textContent = '🍎';
                
                const number = document.createElement('div');
                number.className = 'apple-number';
                number.textContent = `第${i + 1}个`;
                apple.appendChild(number);
                
                apple.onclick = () => selectApple(i);
                applesRow.appendChild(apple);
                apples.push({ index: i, position: i + 1, element: apple, removed: false });
            }
        }

        // 选择苹果
        function selectApple(index) {
            if (apples[index].removed) return;
            
            if (taskMode === 'ordinal') {
                // 序数模式：只能选择一个
                selectedApples = [index];
                updateAppleSelection();
            } else {
                // 基数模式：可以多选
                if (selectedApples.includes(index)) {
                    selectedApples = selectedApples.filter(i => i !== index);
                } else {
                    selectedApples.push(index);
                }
                updateAppleSelection();
            }
        }

        // 更新苹果选择状态
        function updateAppleSelection() {
            apples.forEach((apple, index) => {
                if (selectedApples.includes(index)) {
                    apple.element.classList.add('selected');
                } else {
                    apple.element.classList.remove('selected');
                }
            });
        }

        // 设置任务模式
        function setTaskMode(mode) {
            taskMode = mode;
            selectedApples = [];
            updateAppleSelection();
            
            const buttons = document.querySelectorAll('.task-btn');
            buttons.forEach(btn => {
                if (btn.textContent.includes(mode === 'cardinal' ? '拿走几个' : '拿第几个')) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // 执行任务
        function executeTask() {
            const input = parseInt(document.getElementById('taskInput').value);
            
            if (taskMode === 'ordinal') {
                // 拿走第几个
                if (input >= 1 && input <= totalApples) {
                    const index = input - 1;
                    if (!apples[index].removed) {
                        removeApple(index);
                        document.getElementById('selectedOrdinal').textContent = input;
                    }
                }
            } else {
                // 拿走几个
                if (input >= 1 && input <= totalApples) {
                    const availableApples = apples.filter(a => !a.removed);
                    const toRemove = Math.min(input, availableApples.length);
                    
                    for (let i = 0; i < toRemove; i++) {
                        if (availableApples[i]) {
                            removeApple(availableApples[i].index);
                        }
                    }
                    updateCardinalCount();
                }
            }
        }

        // 移除苹果
        function removeApple(index) {
            if (apples[index].removed) return;
            
            apples[index].removed = true;
            apples[index].element.classList.add('removed');
            
            // 添加到篮子
            const basketApple = document.createElement('div');
            basketApple.className = 'basket-apple';
            basketApple.textContent = '🍎';
            basketApple.style.background = apples[index].element.style.background || 
                getComputedStyle(apples[index].element).background;
            document.getElementById('basket').appendChild(basketApple);
            
            basket.push(index);
            selectedApples = selectedApples.filter(i => i !== index);
            updateAppleSelection();
        }

        // 更新基数计数
        function updateCardinalCount() {
            document.getElementById('selectedCardinal').textContent = basket.length;
        }

        // 显示问题
        function showQuestion() {
            if (currentQuestion >= questions.length) {
                currentQuestion = 0;
            }
            
            const q = questions[currentQuestion];
            document.getElementById('questionText').textContent = q.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-button';
                button.textContent = option;
                button.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(button);
            });
            
            // 清除之前的反馈
            document.getElementById('feedback').className = 'feedback';
            document.getElementById('explanation').className = 'explanation';
        }

        // 检查答案
        function checkAnswer(selectedIndex) {
            const q = questions[currentQuestion];
            const buttons = document.querySelectorAll('#optionsContainer .option-button');
            const feedback = document.getElementById('feedback');
            const explanation = document.getElementById('explanation');
            
            // 禁用所有按钮
            buttons.forEach(btn => {
                btn.style.pointerEvents = 'none';
                const btnIndex = Array.from(buttons).indexOf(btn);
                if (btnIndex === q.correct) {
                    btn.classList.add('correct');
                } else if (btnIndex === selectedIndex) {
                    btn.classList.add('incorrect');
                }
            });
            
            if (selectedIndex === q.correct) {
                feedback.textContent = '✅ 答对了！';
                feedback.className = 'feedback correct';
            } else {
                feedback.textContent = '❌ 答错了，再想想！';
                feedback.className = 'feedback incorrect';
            }
            
            explanation.textContent = q.explanation;
            explanation.classList.add('show');
            
            // 3秒后显示下一题
            setTimeout(() => {
                currentQuestion++;
                showQuestion();
                buttons.forEach(btn => {
                    btn.style.pointerEvents = 'auto';
                    btn.classList.remove('correct', 'incorrect');
                });
            }, 3000);
        }

        // 重置游戏
        function resetGame() {
            apples = [];
            basket = [];
            selectedApples = [];
            currentQuestion = 0;
            taskMode = 'cardinal';
            
            initApples();
            document.getElementById('basket').innerHTML = '';
            document.getElementById('selectedOrdinal').textContent = '-';
            document.getElementById('selectedCardinal').textContent = '0';
            setTaskMode('cardinal');
            showQuestion();
        }

        // 初始化
        window.addEventListener('load', () => {
            initApples();
            setTaskMode('cardinal');
            showQuestion();
        });
    </script>
</body>
</html>
