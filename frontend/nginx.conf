server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 允许大请求体（教案更新等），默认 1m 会导致 413
    client_max_body_size 32m;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # mathlab 静态页与脚本（避免缺失时回退到 Vue index.html 导致 JS 加载成 HTML）
    location ^~ /mathlab/ {
        try_files $uri $uri/ =404;
    }

    # 前端路由（Vue Router）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html 不缓存，确保每次都获取最新版本
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # API 代理到后端（Docker 内 backend:8000，同源避免跨域 401）
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_request_headers on;
        proxy_read_timeout 86400;
    }

    # 上传资源代理到后端（^~ 优先于下方正则，避免 .png 被当静态文件导致 404）
    location ^~ /uploads/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
        proxy_buffering off;
    }

    # 静态资源缓存（排除 index.html）
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000";
    }

    # 健康检查
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

