<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InspireEd - 探究式STEM教学系统</title>
  </head>
  <body>
    <div id="app">
      <!-- 在 main.ts 执行并成功 mount 之前可见；若一直停留在此说明 JS 未跑完或未挂载 -->
      <div
        id="app-static-boot"
        style="padding: 24px; font-family: system-ui, sans-serif; color: #334155; max-width: 36rem; line-height: 1.5"
      >
        <p style="font-weight: 600; margin: 0 0 8px">正在加载 InspireEd…</p>
        <p style="margin: 0; font-size: 14px; color: #64748b">
          若长时间只有本页文字：请按 F12 打开「控制台」和「网络」，看 <code>/src/main.ts</code> 是否失败（红色）、是否被拦截为空白。
        </p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
