services:
  # PostgreSQL 数据库
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: inspireed-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inspireed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - inspireed-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: inspireed-redis
    command: redis-server
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - inspireed-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: inspireed-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - inspireed-network

  # 后端 FastAPI 服务
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: inspireed-backend
    environment:
      POSTGRES_SERVER: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inspireed
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      ALLOW_LAN_ACCESS: "true"
      BACKEND_CORS_ORIGINS: '["*"]'
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - inspireed-network

  # 前端 - 生产模式（Nginx提供静态文件）
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile  # 使用生产模式 Dockerfile
      args:
        # 构建时传入API地址，留空则自动检测
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: inspireed-frontend
    ports:
      - "80:80"  # Nginx默认端口
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - inspireed-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backend_storage:
    driver: local

networks:
  inspireed-network:
    name: docker_inspireed-network
    driver: bridge
