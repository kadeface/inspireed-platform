services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: inspireed-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - inspireed-network

  redis:
    image: redis:7-alpine
    container_name: inspireed-redis
    command: sh -c "redis-server --requirepass \"$REDIS_PASSWORD\""
    env_file:
      - .env
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - inspireed-network

  minio:
    image: minio/minio:latest
    container_name: inspireed-minio
    command: server /data --console-address ":9001"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - inspireed-network
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        # 若拉取 Docker Hub 超时，使用镜像源（默认 DaoCloud）；恢复官方可设 DOCKER_BASE_IMAGE=python:3.10-slim
        BASE_IMAGE: ${DOCKER_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.10-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
    container_name: inspireed-backend
    env_file:
      - .env
      - ../backend/.env
    environment:
      POSTGRES_SERVER: postgres
      REDIS_HOST: redis
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      ALLOW_LAN_ACCESS: "true"
    ports:
      - "8000:8000"
    volumes:
      # 挂载宿主机 backend/storage，使本机资源文件可被后端访问（否则 /uploads/resources/ 会 404）
      - ../backend/storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - inspireed-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: inspireed-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - inspireed-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  backend_storage:

networks:
  inspireed-network:
    name: docker_inspireed-network
    driver: bridge
