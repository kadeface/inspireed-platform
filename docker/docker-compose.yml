services:
  # PostgreSQL 数据库
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: inspireed-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  # 硬编码密码，与 docker-compose.yml 保持一致
      POSTGRES_DB: inspireed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - inspireed-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: inspireed-redis
    command: redis-server  # 不使用密码，与 docker-compose.yml 保持一致
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - inspireed-network

  # MinIO 对象存储（生产环境建议使用阿里云 OSS）
  minio:
    image: minio/minio:latest
    container_name: inspireed-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin  # 硬编码密码，与 docker-compose.yml 保持一致
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - inspireed-network

  # 后端 FastAPI 服务
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: inspireed-backend
    # backend/.env 通过 volume mount 挂载到容器中，应用会自动读取
    # 但需要覆盖一些 Docker 网络相关的配置
    environment:
      # 数据库配置（Docker 网络中使用服务名，覆盖 backend/.env 中的 localhost）
      POSTGRES_SERVER: postgres  # Docker 网络中使用服务名
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inspireed
      POSTGRES_PORT: 5432
      # Redis 配置（Docker 网络中使用服务名）
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # MinIO 配置（Docker 网络中使用服务名）
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      # CORS 配置 - CloudStudio 环境需要允许所有来源
      # 确保 ALLOW_LAN_ACCESS 为 True，这样会使用正则表达式匹配所有 CloudStudio 域名
      ALLOW_LAN_ACCESS: "true"
      BACKEND_CORS_ORIGINS: '["*"]'
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
      - backend_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - inspireed-network

  # 前端 Vue 应用 - CloudStudio 版本（使用开发服务器，端口 5173）
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev  # 使用开发模式 Dockerfile
    container_name: inspireed-frontend
    ports:
      - "5173:5173"  # CloudStudio 需要端口 5173
    # ⚠️ 不设置 VITE_API_BASE_URL 环境变量，让前端代码完全自动检测 CloudStudio 环境
    # 前端代码会自动检测 cloudstudio.club 域名并使用 HTTPS
    # 如果需要设置，可以通过外部环境变量传入：export VITE_API_BASE_URL=...
    # 但代码会自动处理 localhost 并转换为正确的 CloudStudio HTTPS URL
    # environment:
    #   - VITE_API_BASE_URL=${VITE_API_BASE_URL:-}
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5173 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - inspireed-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  backend_storage:
    driver: local

networks:
  inspireed-network:
    name: docker_inspireed-network
    driver: bridge

