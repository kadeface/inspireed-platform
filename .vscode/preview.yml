# CloudStudio Preview 配置
# CloudStudio 默认读取 .vscode/preview.yml
# 此配置使用统一的 Docker Compose 启动脚本（start-cloudstudio.sh）

autoOpen: false # 打开工作空间时是否自动开启所有应用的预览

apps:
  # 使用统一的 Docker Compose 启动脚本
  # 此脚本会启动所有服务：PostgreSQL, Redis, MinIO, Backend(8000), Frontend(5173)
  - port: 5173
    run: bash start-cloudstudio.sh
    root: .
    name: inspireed-full-stack
    description: InspireEd 全栈服务（通过 Docker Compose 启动，包含后端 API 和前端应用）
    autoOpen: true
