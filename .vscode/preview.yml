# VS Code Preview 配置
# 用于 VS Code 的预览功能，支持本地开发环境
# 注意：这是用于 VS Code 的配置，CloudStudio 使用 .cloudstudio/preview.yaml
autoOpen: false
apps:
  - port: 8000
    run: bash .vscode/start-backend.sh
    root: .
    name: backend-api
    description: InspireEd 后端 API 服务 (FastAPI)，提供 RESTful API 和 Swagger 文档
    autoOpen: true

  - port: 5173
    run: bash .vscode/start-frontend.sh
    root: .
    name: frontend-app
    description: InspireEd 前端 Web 应用 (Vue 3 + Vite)，用户界面（已配置支持 CloudStudio 域名）
    autoOpen: false
