autoOpen: false
apps:
  - port: 8000
    run: bash .vscode/start-backend.sh
    root: .
    name: backend-api
    description: InspireEd 后端 API 服务 (FastAPI)，提供 RESTful API 和 Swagger 文档
    autoOpen: true

  - port: 5173
    run: bash .vscode/start-frontend.sh
    root: .
    name: frontend-app
    description: InspireEd 前端 Web 应用 (Vue 3 + Vite)，用户界面
    autoOpen: false
