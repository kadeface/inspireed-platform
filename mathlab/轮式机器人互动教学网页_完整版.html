<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轮式机器人数学融合互动教学平台 - 完整图形化编程版</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    
    <style>
        :root {
            --bg: #e8eef4;
            --surface: #ffffff;
            --surface-2: #f4f7fb;
            --border: #d4dde8;
            --text: #1a2b3c;
            --text-muted: #5c6f82;
            --primary: #0d9488;
            --primary-dark: #0f766e;
            --primary-light: #ccfbf1;
            --accent: #f97316;
            --accent-light: #ffedd5;
            --success: #16a34a;
            --warning: #eab308;
            --danger: #dc2626;
            --shadow-sm: 0 1px 3px rgba(26, 43, 60, 0.06);
            --shadow-md: 0 8px 24px rgba(26, 43, 60, 0.1);
            --shadow-lg: 0 20px 50px rgba(26, 43, 60, 0.12);
            --radius: 14px;
            --radius-sm: 8px;
            --font-display: 'Outfit', 'Noto Sans SC', sans-serif;
            --font-body: 'Noto Sans SC', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(13, 148, 136, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(249, 115, 22, 0.06) 0%, transparent 40%);
            min-height: 100vh;
            padding: 16px;
            color: var(--text);
            line-height: 1.5;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: calc(var(--radius) + 4px);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            animation: fadeUp 0.5s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: var(--surface);
            padding: 20px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), #06b6d4, var(--accent));
        }

        .header-brand { flex: 1; min-width: 240px; }

        .header-badge {
            display: inline-block;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--primary-dark);
            background: var(--primary-light);
            padding: 4px 10px;
            border-radius: 999px;
            margin-bottom: 8px;
        }

        .header h1 {
            font-family: var(--font-display);
            font-size: clamp(1.35rem, 2.5vw, 1.75rem);
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .header-actions .button-group { justify-content: flex-end; }

        .controls {
            display: flex;
            gap: 16px;
            padding: 14px 24px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 140px;
        }

        .control-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .control-group select {
            padding: 9px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .control-group select:hover { border-color: var(--primary); }
        .control-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 220px);
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            background: #fafbfc;
        }

        .panel-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 1rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--surface);
        }

        .panel-header .icon {
            width: 32px; height: 32px;
            background: var(--primary-light);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        #blocklyDiv { flex: 1; min-height: 420px; }

        .right-panel {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--surface-2);
        }

        .canvas-section {
            flex: 1;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .canvas-wrap {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }

        .canvas-wrap::after {
            content: '1 格 = 10 cm';
            position: absolute;
            bottom: 10px;
            right: 12px;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.35);
            padding: 3px 8px;
            border-radius: 4px;
            pointer-events: none;
        }

        #robotCanvas {
            display: block;
            background: #1e293b;
        }

        .button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 9px 18px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 2px 8px rgba(13, 148, 136, 0.35);
        }
        .btn-primary:hover { background: var(--primary-dark); }

        .btn-success {
            background: var(--success);
            color: white;
            box-shadow: 0 2px 8px rgba(22, 163, 74, 0.3);
        }

        .btn-warning {
            background: var(--warning);
            color: #422006;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--surface-2); }

        .btn-danger {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
        }
        .btn-danger:hover { background: #fee2e2; }

        .parameter-input {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 520px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .input-group input {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: inherit;
            background: var(--surface);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.12);
        }

        .result-display {
            width: 100%;
            max-width: 520px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent);
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text);
        }

        .result-display strong { color: var(--primary-dark); }

        .info-section {
            padding: 20px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            overflow-y: auto;
            max-height: 320px;
        }

        .info-section > h3 {
            font-family: var(--font-display);
            font-size: 1.05rem;
            margin-bottom: 14px;
            color: var(--text);
        }

        #scenarioInfo h4 {
            font-size: 0.95rem;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        #scenarioInfo p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .formula-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .formula-container {
            background: var(--surface-2);
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .formula-container h4 {
            font-size: 0.85rem;
            color: var(--primary-dark);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .formula-container p { font-size: 0.9rem; color: var(--text-muted); }

        .subsection-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            margin: 16px 0 10px;
        }

        .code-output {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: var(--radius-sm);
            font-family: 'SF Mono', 'Fira Code', Consolas, monospace;
            font-size: 0.82rem;
            line-height: 1.65;
            overflow-x: auto;
            white-space: pre;
            border: 1px solid #334155;
        }

        .status-bar {
            background: var(--surface-2);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.88rem;
            font-weight: 500;
            border-top: 1px solid var(--border);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.25);
            animation: pulse 2s infinite;
        }

        .status-dot.busy { background: var(--accent); box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.25); }
        .status-dot.error { background: var(--danger); box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.25); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 1200px) {
            .main-layout { grid-template-columns: 1fr; min-height: auto; }
            .left-panel { border-right: none; border-bottom: 1px solid var(--border); }
            #blocklyDiv { min-height: 360px; }
        }

        @media (max-width: 640px) {
            body { padding: 8px; }
            .header { padding: 16px; }
            .parameter-input { grid-template-columns: 1fr; }
            #robotCanvas { width: 100%; height: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-brand">
                <span class="header-badge">STEM · 数学 × 编程</span>
                <h1>轮式机器人互动教学平台</h1>
                <p>拖拽代码块控制机器人，在模拟中理解距离、角度与圆周率</p>
            </div>
            <div class="header-actions">
                <div class="button-group">
                    <button class="btn btn-success" onclick="runCode()">▶ 运行代码</button>
                    <button class="btn btn-warning" onclick="resetRobot()">↺ 重置</button>
                    <button class="btn btn-secondary" onclick="showCode()">⌘ 查看代码</button>
                    <button class="btn btn-danger" onclick="clearWorkspace()">清空工作区</button>
                </div>
            </div>
        </header>

        <div class="controls">
            <div class="control-group">
                <label>选择学段</label>
                <select id="stageSelect" onchange="updateGrades()">
                    <option value="primary">小学阶段</option>
                    <option value="junior">初中阶段</option>
                </select>
            </div>
            <div class="control-group">
                <label>选择年级</label>
                <select id="gradeSelect" onchange="updateTasks()">
                    <option value="2">二年级</option>
                </select>
            </div>
            <div class="control-group">
                <label>选择任务</label>
                <select id="taskSelect" onchange="loadTask()">
                    <option value="1">任务1：机器人测距员</option>
                </select>
            </div>
        </div>

        <div class="main-layout">
            <!-- Left Panel: Blockly Programming -->
            <div class="left-panel">
                <div class="panel-header">
                    <span class="icon">🧩</span>
                    图形化编程区 · 拖拽代码块编写程序
                </div>
                <div id="blocklyDiv"></div>
            </div>

            <!-- Right Panel: Robot Canvas + Info -->
            <div class="right-panel">
                <div class="canvas-section">
                    <h3 class="section-title">🤖 机器人运动模拟</h3>
                    <div class="canvas-wrap">
                        <canvas id="robotCanvas" width="600" height="400"></canvas>
                    </div>
                    
                    <div class="parameter-input">
                        <div class="input-group">
                            <label>轮子直径 (cm):</label>
                            <input type="number" id="wheelDiameter" value="3" min="1" max="10" step="0.5">
                        </div>
                        <div class="input-group">
                            <label>速度 (cm/s):</label>
                            <input type="number" id="robotSpeed" value="10" min="1" max="50" step="1">
                        </div>
                    </div>
                    
                    <div class="result-display" id="resultDisplay">
                        等待运行代码...
                    </div>
                    
                    <div class="button-group">
                        <button class="btn btn-primary" onclick="startRobot()">▶ 启动机器人</button>
                        <button class="btn btn-secondary" onclick="toggleGrid()">网格显示</button>
                    </div>
                </div>

                <div class="info-section">
                    <h3>📖 教学内容</h3>
                    <div id="scenarioInfo">
                        <h4>教学目标</h4>
                        <p>通过图形化编程，学习机器人运动控制与数学知识的融合，理解周长、距离与角度的关系。</p>
                    </div>
                    
                    <div id="formulaSection">
                        <p class="subsection-title">📐 数学公式</p>
                        <div class="formula-grid">
                            <div class="formula-container">
                                <h4>轮子周长</h4>
                                <p>$$C = \pi \times d$$</p>
                            </div>
                            <div class="formula-container">
                                <h4>行进距离</h4>
                                <p>$$S = C \times n$$</p>
                                <p>其中 $n$ 为转动圈数</p>
                            </div>
                        </div>
                    </div>
                    
                    <div id="codeOutputSection" style="display: none;">
                        <p class="subsection-title">💻 生成的代码</p>
                        <div class="code-output" id="generatedCode"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusBar">就绪 — 请在左侧拖拽代码块编写程序</span>
        </div>
    </div>

    <script>
        // ==================== Blockly Initialization ====================
        let workspace = null;
        
        function initBlockly() {
            // Define custom blocks
            Blockly.defineBlocksWithJsonArray([
                // ===== Program Control Blocks =====
                {
                    "type": "control_start",
                    "message0": "开始",
                    "nextStatement": true,
                    "colour": 120,
                    "tooltip": "程序开始块 - 所有程序都从这里开始"
                },
                {
                    "type": "control_if",
                    "message0": "如果 %1 那么",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "CONDITION",
                            "check": "Boolean"
                        }
                    ],
                    "message1": "执行 %1",
                    "args1": [
                        {
                            "type": "input_statement",
                            "name": "DO"
                        }
                    ],
                    "previousStatement": true,
                    "nextStatement": true,
                    "colour": 210,
                    "tooltip": "条件判断 - 如果条件为真，执行内部代码"
                },
                {
                    "type": "control_if_else",
                    "message0": "如果 %1 那么",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "CONDITION",
                            "check": "Boolean"
                        }
                    ],
                    "message1": "执行 %1",
                    "args1": [
                        {
                            "type": "input_statement",
                            "name": "DO"
                        }
                    ],
                    "message2": "否则 执行 %1",
                    "args2": [
                        {
                            "type": "input_statement",
                            "name": "ELSE"
                        }
                    ],
                    "previousStatement": true,
                    "nextStatement": true,
                    "colour": 210,
                    "tooltip": "条件判断 - 如果条件为真执行'那么'，否则执行'否则'"
                },
                {
                    "type": "control_repeat",
                    "message0": "重复执行 %1 次",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "TIMES",
                            "check": "Number"
                        }
                    ],
                    "message1": "执行 %1",
                    "args1": [
                        {
                            "type": "input_statement",
                            "name": "DO"
                        }
                    ],
                    "previousStatement": true,
                    "nextStatement": true,
                    "colour": 65,
                    "tooltip": "循环 - 重复执行指定次数的代码"
                },
                {
                    "type": "control_while",
                    "message0": "当 %1 时 重复执行",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "CONDITION",
                            "check": "Boolean"
                        }
                    ],
                    "message1": "执行 %1",
                    "args1": [
                        {
                            "type": "input_statement",
                            "name": "DO"
                        }
                    ],
                    "previousStatement": true,
                    "nextStatement": true,
                    "colour": 65,
                    "tooltip": "循环 - 当条件为真时重复执行"
                },
                {
                    "type": "control_forever",
                    "message0": "永久重复执行",
                    "message1": "执行 %1",
                    "args1": [
                        {
                            "type": "input_statement",
                            "name": "DO"
                        }
                    ],
                    "previousStatement": true,
                    "colour": 65,
                    "tooltip": "循环 - 永久重复执行内部代码"
                },
                {
                    "type": "logic_compare",
                    "message0": "%1 %2 %3",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "A",
                            "check": "Number"
                        },
                        {
                            "type": "field_dropdown",
                            "name": "OP",
                            "options": [
                                ["=", "EQ"],
                                ["≠", "NEQ"],
                                [">", "GT"],
                                ["≥", "GTE"],
                                ["<", "LT"],
                                ["≤", "LTE"]
                            ]
                        },
                        {
                            "type": "input_value",
                            "name": "B",
                            "check": "Number"
                        }
                    ],
                    "output": "Boolean",
                    "colour": 210,
                    "tooltip": "逻辑比较 - 比较两个数值"
                },
                {
                    "type": "logic_operation",
                    "message0": "%1 %2 %3",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "A",
                            "check": "Boolean"
                        },
                        {
                            "type": "field_dropdown",
                            "name": "OP",
                            "options": [
                                ["并且", "AND"],
                                ["或者", "OR"]
                            ]
                        },
                        {
                            "type": "input_value",
                            "name": "B",
                            "check": "Boolean"
                        }
                    ],
                    "output": "Boolean",
                    "colour": 210,
                    "tooltip": "逻辑运算 - 与（AND）或或（OR）"
                },
                {
                    "type": "logic_boolean",
                    "message0": "%1",
                    "args0": [
                        {
                            "type": "field_dropdown",
                            "name": "BOOL",
                            "options": [
                                ["真", "TRUE"],
                                ["假", "FALSE"]
                            ]
                        }
                    ],
                    "output": "Boolean",
                    "colour": 210,
                    "tooltip": "布尔值 - 真或假"
                },
                // ===== Robot Motion Blocks =====
                {
                    "type": "robot_forward",
                    "message0": "前进 %1 厘米",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "DISTANCE",
                            "check": "Number"
                        }
                    ],
                    "previousStatement": true,
                    "nextStatement": true,
                    "colour": 160,
                    "tooltip": "让机器人前进指定距离"
                },
                {
                    "type": "robot_backward",
                    "message0": "后退 %1 厘米",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "DISTANCE",
                            "check": "Number"
                        }
                    ],
                    "previousStatement": true,
                    "nextStatement": true,
                    "colour": 160,
                    "tooltip": "让机器人后退指定距离"
                },
                {
                    "type": "robot_turn_left",
                    "message0": "左转 %1 度",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "ANGLE",
                            "check": "Number"
                        }
                    ],
                    "previousStatement": true,
                    "nextStatement": true,
                    "colour": 280,
                    "tooltip": "让机器人左转指定角度"
                },
                {
                    "type": "robot_turn_right",
                    "message0": "右转 %1 度",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "ANGLE",
                            "check": "Number"
                        }
                    ],
                    "previousStatement": true,
                    "nextStatement": true,
                    "colour": 280,
                    "tooltip": "让机器人右转指定角度"
                },
                {
                    "type": "robot_stop",
                    "message0": "停止",
                    "previousStatement": true,
                    "nextStatement": true,
                    "colour": 0,
                    "tooltip": "让机器人停止运动"
                },
                // ===== Parameter Settings =====
                {
                    "type": "robot_speed",
                    "message0": "设置速度 %1",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "SPEED",
                            "check": "Number"
                        }
                    ],
                    "previousStatement": true,
                    "nextStatement": true,
                    "colour": 120,
                    "tooltip": "设置机器人运动速度"
                },
                {
                    "type": "robot_wait",
                    "message0": "等待 %1 秒",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "TIME",
                            "check": "Number"
                        }
                    ],
                    "previousStatement": true,
                    "nextStatement": true,
                    "colour": 60,
                    "tooltip": "让机器人等待指定时间"
                },
                // ===== Math Blocks =====
                {
                    "type": "math_number",
                    "message0": "%1",
                    "args0": [
                        {
                            "type": "field_number",
                            "name": "NUM",
                            "value": 0
                        }
                    ],
                    "output": "Number",
                    "colour": 230,
                    "tooltip": "输入数字"
                },
                {
                    "type": "math_calculate",
                    "message0": "%1 %2 %3",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "A",
                            "check": "Number"
                        },
                        {
                            "type": "field_dropdown",
                            "name": "OP",
                            "options": [
                                ["+", "ADD"],
                                ["-", "MINUS"],
                                ["×", "MUL"],
                                ["÷", "DIV"]
                            ]
                        },
                        {
                            "type": "input_value",
                            "name": "B",
                            "check": "Number"
                        }
                    ],
                    "output": "Number",
                    "colour": 230,
                    "tooltip": "进行数学计算"
                },
                {
                    "type": "math_const_pi",
                    "message0": "π",
                    "output": "Number",
                    "colour": 230,
                    "tooltip": "圆周率 π ≈ 3.14159"
                },
                {
                    "type": "math_circumference",
                    "message0": "计算周长 直径=%1",
                    "args0": [
                        {
                            "type": "input_value",
                            "name": "DIAMETER",
                            "check": "Number"
                        }
                    ],
                    "output": "Number",
                    "colour": 230,
                    "tooltip": "计算圆的周长 C = π × d"
                }
            ]);

            // JavaScript code generator for custom blocks
            // Control blocks
            Blockly.JavaScript['control_start'] = function(block) {
                const statements = Blockly.JavaScript.statementToCode(block, 'NEXT') || '';
                return `async function main() {\n${statements}}\n\nmain();\n`;
            };

            Blockly.JavaScript['control_if'] = function(block) {
                const condition = Blockly.JavaScript.valueToCode(block, 'CONDITION', Blockly.JavaScript.ORDER_ATOMIC) || 'false';
                const statements = Blockly.JavaScript.statementToCode(block, 'DO') || '';
                return `if (${condition}) {\n${statements}}\n`;
            };

            Blockly.JavaScript['control_if_else'] = function(block) {
                const condition = Blockly.JavaScript.valueToCode(block, 'CONDITION', Blockly.JavaScript.ORDER_ATOMIC) || 'false';
                const statementsIf = Blockly.JavaScript.statementToCode(block, 'DO') || '';
                const statementsElse = Blockly.JavaScript.statementToCode(block, 'ELSE') || '';
                return `if (${condition}) {\n${statementsIf}} else {\n${statementsElse}}\n`;
            };

            Blockly.JavaScript['control_repeat'] = function(block) {
                const times = Blockly.JavaScript.valueToCode(block, 'TIMES', Blockly.JavaScript.ORDER_ATOMIC) || '0';
                const statements = Blockly.JavaScript.statementToCode(block, 'DO') || '';
                return `for (let i = 0; i < ${times}; i++) {\n${statements}}\n`;
            };

            Blockly.JavaScript['control_while'] = function(block) {
                const condition = Blockly.JavaScript.valueToCode(block, 'CONDITION', Blockly.JavaScript.ORDER_ATOMIC) || 'false';
                const statements = Blockly.JavaScript.statementToCode(block, 'DO') || '';
                return `while (${condition}) {\n${statements}}\n`;
            };

            Blockly.JavaScript['control_forever'] = function(block) {
                const statements = Blockly.JavaScript.statementToCode(block, 'DO') || '';
                return `while (true) {\n${statements}}\n`;
            };

            // Logic blocks
            Blockly.JavaScript['logic_compare'] = function(block) {
                const a = Blockly.JavaScript.valueToCode(block, 'A', Blockly.JavaScript.ORDER_ATOMIC) || '0';
                const b = Blockly.JavaScript.valueToCode(block, 'B', Blockly.JavaScript.ORDER_ATOMIC) || '0';
                const op = block.getFieldValue('OP');
                let operator = '';
                switch(op) {
                    case 'EQ': operator = '==='; break;
                    case 'NEQ': operator = '!=='; break;
                    case 'GT': operator = '>'; break;
                    case 'GTE': operator = '>='; break;
                    case 'LT': operator = '<'; break;
                    case 'LTE': operator = '<='; break;
                }
                return [a + ' ' + operator + ' ' + b, Blockly.JavaScript.ORDER_ATOMIC];
            };

            Blockly.JavaScript['logic_operation'] = function(block) {
                const a = Blockly.JavaScript.valueToCode(block, 'A', Blockly.JavaScript.ORDER_ATOMIC) || 'false';
                const b = Blockly.JavaScript.valueToCode(block, 'B', Blockly.JavaScript.ORDER_ATOMIC) || 'false';
                const op = block.getFieldValue('OP');
                const operator = op === 'AND' ? '&&' : '||';
                return [a + ' ' + operator + ' ' + b, Blockly.JavaScript.ORDER_ATOMIC];
            };

            Blockly.JavaScript['logic_boolean'] = function(block) {
                const bool = block.getFieldValue('BOOL') === 'TRUE';
                return [bool ? 'true' : 'false', Blockly.JavaScript.ORDER_ATOMIC];
            };

            // Robot motion blocks
            Blockly.JavaScript['robot_forward'] = function(block) {
                const distance = Blockly.JavaScript.valueToCode(block, 'DISTANCE', Blockly.JavaScript.ORDER_ATOMIC) || '0';
                return `await robotForward(${distance});\n`;
            };

            Blockly.JavaScript['robot_backward'] = function(block) {
                const distance = Blockly.JavaScript.valueToCode(block, 'DISTANCE', Blockly.JavaScript.ORDER_ATOMIC) || '0';
                return `await robotBackward(${distance});\n`;
            };

            Blockly.JavaScript['robot_turn_left'] = function(block) {
                const angle = Blockly.JavaScript.valueToCode(block, 'ANGLE', Blockly.JavaScript.ORDER_ATOMIC) || '0';
                return `await robotTurn(-${angle});\n`;
            };

            Blockly.JavaScript['robot_turn_right'] = function(block) {
                const angle = Blockly.JavaScript.valueToCode(block, 'ANGLE', Blockly.JavaScript.ORDER_ATOMIC) || '0';
                return `await robotTurn(${angle});\n`;
            };

            Blockly.JavaScript['robot_stop'] = function(block) {
                return `robotStop();\n`;
            };

            Blockly.JavaScript['robot_speed'] = function(block) {
                const speed = Blockly.JavaScript.valueToCode(block, 'SPEED', Blockly.JavaScript.ORDER_ATOMIC) || '10';
                return `robotSetSpeed(${speed});\n`;
            };

            Blockly.JavaScript['robot_wait'] = function(block) {
                const time = Blockly.JavaScript.valueToCode(block, 'TIME', Blockly.JavaScript.ORDER_ATOMIC) || '1';
                return `await robotWait(${time});\n`;
            };

            // Math blocks
            Blockly.JavaScript['math_number'] = function(block) {
                const num = block.getFieldValue('NUM');
                return [num, Blockly.JavaScript.ORDER_ATOMIC];
            };

            Blockly.JavaScript['math_calculate'] = function(block) {
                const a = Blockly.JavaScript.valueToCode(block, 'A', Blockly.JavaScript.ORDER_ATOMIC) || '0';
                const b = Blockly.JavaScript.valueToCode(block, 'B', Blockly.JavaScript.ORDER_ATOMIC) || '0';
                const op = block.getFieldValue('OP');
                let operator = '';
                switch(op) {
                    case 'ADD': operator = '+'; break;
                    case 'MINUS': operator = '-'; break;
                    case 'MUL': operator = '*'; break;
                    case 'DIV': operator = '/'; break;
                }
                return [a + ' ' + operator + ' ' + b, Blockly.JavaScript.ORDER_ATOMIC];
            };

            Blockly.JavaScript['math_const_pi'] = function(block) {
                return ['Math.PI', Blockly.JavaScript.ORDER_ATOMIC];
            };

            Blockly.JavaScript['math_circumference'] = function(block) {
                const diameter = Blockly.JavaScript.valueToCode(block, 'DIAMETER', Blockly.JavaScript.ORDER_ATOMIC) || '0';
                return [Math.PI + ' * ' + diameter, Blockly.JavaScript.ORDER_ATOMIC];
            };

            // Initialize workspace
            workspace = Blockly.inject('blocklyDiv', {
                toolbox: `
                    <xml>
                        <category name="程序控制" colour="120">
                            <block type="control_start"></block>
                            <block type="control_if"></block>
                            <block type="control_if_else"></block>
                            <block type="control_repeat"></block>
                            <block type="control_while"></block>
                            <block type="control_forever"></block>
                        </category>
                        <category name="逻辑判断" colour="210">
                            <block type="logic_compare"></block>
                            <block type="logic_operation"></block>
                            <block type="logic_boolean"></block>
                        </category>
                        <category name="机器人运动" colour="160">
                            <block type="robot_forward"></block>
                            <block type="robot_backward"></block>
                            <block type="robot_turn_left"></block>
                            <block type="robot_turn_right"></block>
                            <block type="robot_stop"></block>
                        </category>
                        <category name="参数设置" colour="120">
                            <block type="robot_speed"></block>
                            <block type="robot_wait"></block>
                        </category>
                        <category name="数学计算" colour="230">
                            <block type="math_number"></block>
                            <block type="math_calculate"></block>
                            <block type="math_const_pi"></block>
                            <block type="math_circumference"></block>
                        </category>
                    </xml>
                `,
                grid: {
                    spacing: 20,
                    length: 3,
                    colour: '#d4dde8',
                    snap: true
                },
                zoom: {
                    controls: true,
                    wheel: true,
                    startScale: 1.0,
                    maxScale: 3,
                    minScale: 0.3,
                    scaleSpeed: 1.2
                },
                trashcan: true,
                scrollbars: true
            });
        }

        // ==================== Robot Canvas ====================
        let canvas = null;
        let ctx = null;
        let robot = {
            x: 50,
            y: 200,
            angle: 0,
            isMoving: false,
            speed: 10,
            distanceMoved: 0
        };
        let showGrid = true;
        let isAnimating = false;

        // Initialize canvas
        function initCanvas() {
            canvas = document.getElementById('robotCanvas');
            ctx = canvas.getContext('2d');
            drawCanvas();
        }

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (showGrid) {
                drawGrid();
            }
            
            drawGround();
            drawRobot();
            drawTrajectory();
        }

        function drawGrid() {
            const step = 50;
            ctx.strokeStyle = 'rgba(148, 163, 184, 0.25)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= canvas.width; x += step) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += step) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            ctx.fillStyle = 'rgba(148, 163, 184, 0.5)';
            ctx.font = '10px sans-serif';
            for (let x = step; x < canvas.width; x += step) {
                ctx.fillText((x / 5) + '', x - 8, canvas.height - 6);
            }
        }

        function drawGround() {
            const groundY = Math.min(robot.y + 32, canvas.height - 8);
            const grad = ctx.createLinearGradient(0, groundY - 20, 0, canvas.height);
            grad.addColorStop(0, '#334155');
            grad.addColorStop(1, '#1e293b');
            ctx.fillStyle = grad;
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.strokeStyle = '#0d9488';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.stroke();
        }

        function drawRobot() {
            ctx.save();
            ctx.translate(robot.x, robot.y);
            ctx.rotate(robot.angle);

            ctx.shadowColor = 'rgba(0,0,0,0.35)';
            ctx.shadowBlur = 12;
            ctx.shadowOffsetY = 4;

            // Body
            const bodyGrad = ctx.createLinearGradient(-22, -16, 22, 16);
            bodyGrad.addColorStop(0, '#14b8a6');
            bodyGrad.addColorStop(1, '#0d9488');
            ctx.fillStyle = bodyGrad;
            roundRect(ctx, -22, -16, 44, 32, 8);
            ctx.fill();

            // Head
            ctx.fillStyle = '#f97316';
            ctx.beginPath();
            ctx.arc(0, -28, 11, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-5, -29, 3.5, 0, Math.PI * 2);
            ctx.arc(5, -29, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#1e293b';
            ctx.beginPath();
            ctx.arc(-4, -29, 1.5, 0, Math.PI * 2);
            ctx.arc(6, -29, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // Wheels
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#1e293b';
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            [-26, 16].forEach(wx => {
                ctx.beginPath();
                ctx.ellipse(wx, 18, 8, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            });

            // Direction arrow
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath();
            ctx.moveTo(24, 0);
            ctx.lineTo(38, 0);
            ctx.lineTo(32, -6);
            ctx.lineTo(38, 0);
            ctx.lineTo(32, 6);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        function drawTrajectory() {
            if (robot.distanceMoved <= 0) return;
            const startX = 50;
            ctx.beginPath();
            ctx.moveTo(startX, robot.y);
            ctx.lineTo(robot.x, robot.y);
            ctx.strokeStyle = '#f97316';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 6]);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#f97316';
            ctx.beginPath();
            ctx.arc(robot.x, robot.y, 5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#e2e8f0';
            ctx.font = '600 14px Outfit, Noto Sans SC, sans-serif';
            const label = robot.distanceMoved.toFixed(1) + ' cm';
            const midX = (startX + robot.x) / 2;
            const tw = ctx.measureText(label).width;
            ctx.fillStyle = 'rgba(15, 23, 42, 0.75)';
            roundRect(ctx, midX - tw/2 - 8, robot.y - 32, tw + 16, 22, 6);
            ctx.fill();
            ctx.fillStyle = '#fbbf24';
            ctx.fillText(label, midX - tw/2, robot.y - 16);
        }

        // ==================== Robot Control Functions ====================
        function robotForward(distance) {
            return new Promise((resolve) => {
                const pixelsPerCm = 5;
                const startX = robot.x;
                const startY = robot.y;
                const targetX = startX + distance * pixelsPerCm * Math.cos(robot.angle);
                const targetY = startY + distance * pixelsPerCm * Math.sin(robot.angle);
                const duration = (distance / robot.speed) * 1000;
                const startTime = Date.now();
                
                function animate() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    robot.x = startX + (targetX - startX) * progress;
                    robot.y = startY + (targetY - startY) * progress;
                    robot.distanceMoved = distance * progress;
                    
                    drawCanvas();
                    updateResultDisplay();
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        resolve();
                    }
                }
                
                animate();
            });
        }

        function robotBackward(distance) {
            return robotForward(-distance);
        }

        function robotTurn(angle) {
            return new Promise((resolve) => {
                const targetAngle = robot.angle + (angle * Math.PI / 180);
                const duration = 1000;
                const startTime = Date.now();
                
                function animate() {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    robot.angle = robot.angle + (targetAngle - robot.angle) * progress;
                    
                    drawCanvas();
                    
                    if (progress < 1) {
                        requestAnimationFrame(animate);
                    } else {
                        resolve();
                    }
                }
                
                animate();
            });
        }

        function robotSetSpeed(speed) {
            robot.speed = speed;
            updateStatus(`速度已设置为 ${speed} cm/s`);
            return Promise.resolve();
        }

        function robotWait(seconds) {
            return new Promise((resolve) => {
                setTimeout(resolve, seconds * 1000);
            });
        }

        function robotStop() {
            robot.isMoving = false;
            updateStatus('机器人已停止');
            return Promise.resolve();
        }

        // ==================== Code Execution ====================
        async function runCode() {
            if (isAnimating) {
                updateStatus('⚠️ 机器人正在运动中，请等待...');
                return;
            }
            
            updateStatus('正在生成并运行代码…', 'busy');
            
            // Generate JavaScript code from blocks
            const code = Blockly.JavaScript.workspaceToCode(workspace);
            
            // Display generated code
            document.getElementById('generatedCode').textContent = code;
            document.getElementById('codeOutputSection').style.display = 'block';
            
            // Execute the code
            try {
                isAnimating = true;
                updateStatus('机器人正在执行程序…', 'busy');
                const result = eval(code);
                if (result instanceof Promise) {
                    await result;
                }
                updateStatus('程序执行完成', 'ready');
            } catch (error) {
                updateStatus('执行错误: ' + error.message, 'error');
                console.error(error);
            } finally {
                isAnimating = false;
            }
        }

        function showCode() {
            const code = Blockly.JavaScript.workspaceToCode(workspace);
            document.getElementById('generatedCode').textContent = code;
            document.getElementById('codeOutputSection').style.display = 'block';
            updateStatus('📝 已显示生成的代码');
        }

        function clearWorkspace() {
            if (confirm('确定要清空编程区吗？')) {
                workspace.clear();
                updateStatus('🗑️ 已清空编程区');
            }
        }

        // ==================== UI Control ====================
        function startRobot() {
            if (isAnimating) {
                updateStatus('⚠️ 请先使用图形化编程控制机器人');
                return;
            }
            updateStatus('💡 提示：请在左侧拖拽代码块，然后点击"运行代码"');
        }

        function resetRobot() {
            robot.x = 50;
            robot.y = 200;
            robot.angle = 0;
            robot.isMoving = false;
            robot.distanceMoved = 0;
            isAnimating = false;
            drawCanvas();
            updateStatus('已重置机器人位置', 'ready');
            document.getElementById('resultDisplay').innerHTML =
                '<strong>等待运行</strong><br>从左侧拖入「开始」与运动块，点击顶部「运行代码」';
        }

        function toggleGrid() {
            showGrid = !showGrid;
            drawCanvas();
            updateStatus(showGrid ? '📏 网格已显示' : '📏 网格已隐藏');
        }

        function updateResultDisplay() {
            const wheelDiameter = parseFloat(document.getElementById('wheelDiameter').value) || 3;
            const circumference = Math.PI * wheelDiameter;
            const revolutions = circumference > 0 ? (robot.distanceMoved / circumference).toFixed(2) : '0';

            document.getElementById('resultDisplay').innerHTML =
                '<strong>实时数据</strong><br>' +
                '坐标：(' + robot.x.toFixed(0) + ', ' + robot.y.toFixed(0) + ') px<br>' +
                '已行进：<strong>' + robot.distanceMoved.toFixed(1) + ' cm</strong><br>' +
                '轮周长：' + circumference.toFixed(2) + ' cm · 约 ' + revolutions + ' 圈';
        }

        function updateStatus(message, type) {
            type = type || 'ready';
            const bar = document.getElementById('statusBar');
            const dot = document.getElementById('statusDot');
            if (bar) bar.textContent = message.replace(/^[^\w\u4e00-\u9fff]+\s*/, '');
            if (dot) {
                dot.className = 'status-dot' + (type === 'busy' ? ' busy' : type === 'error' ? ' error' : '');
            }
        }

        // ==================== Task Management ====================
        function updateGrades() {
            updateStatus('📚 学段已切换');
        }

        function updateTasks() {
            updateStatus('📋 任务已加载');
        }

        function loadTask() {
            updateStatus('✅ 任务已加载');
        }

        // ==================== Initialize ====================
        window.onload = function() {
            initBlockly();
            initCanvas();

            const speedInput = document.getElementById('robotSpeed');
            if (speedInput) {
                speedInput.addEventListener('input', function() {
                    robot.speed = parseFloat(this.value) || 10;
                });
            }

            window.addEventListener('resize', function() {
                if (workspace) Blockly.svgResize(workspace);
            });

            document.getElementById('resultDisplay').innerHTML =
                '<strong>等待运行</strong><br>从左侧拖入「开始」与运动块，点击顶部「运行代码」';
            updateStatus('就绪 — 请在左侧拖拽代码块编写程序', 'ready');
        };
    </script>
</body>
</html>
